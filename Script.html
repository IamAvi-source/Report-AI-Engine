<script>
  // Tab Navigation Switching
  function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    const clickedBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
    if (clickedBtn) clickedBtn.classList.add('active');
    
    const targetContent = document.getElementById(`${tabId}-tab`);
    if (targetContent) targetContent.classList.add('active');
    
    // Trigger tab-specific loads
    if (tabId === 'history') {
      loadReportHistory();
    } else if (tabId === 'schedules') {
      loadSchedules();
    } else if (tabId === 'settings') {
      loadSettings();
    }
  }

  // Toast Notification System
  function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    let icon = 'ℹ️';
    if (type === 'success') icon = '✅';
    if (type === 'error') icon = '❌';
    
    toast.innerHTML = `<span>${icon}</span> <div>${message}</div>`;
    container.appendChild(toast);
    
    setTimeout(() => {
      toast.style.animation = 'slideInRight 0.3s reverse';
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  // Quick Date Range helper keys
  function setQuickDate(days) {
    const end = new Date();
    const start = new Date();
    start.setDate(end.getDate() - days);
    
    document.getElementById('startDate').value = start.toISOString().split('T')[0];
    document.getElementById('endDate').value = end.toISOString().split('T')[0];
    showToast(`Date range set to last ${days} days`, 'info');
  }

  // Toggle Custom Date Picker visibility
  function handleReportTypeChange(radio) {
    const customDateGroup = document.getElementById('custom-date-group');
    if (radio.value === 'custom') {
      customDateGroup.style.display = 'block';
    } else {
      customDateGroup.style.display = 'none';
    }
  }

  // Handle Model Card Selection Styling
  function selectModelCard(radio) {
    document.querySelectorAll('.model-card').forEach(card => card.classList.remove('active'));
    radio.closest('.model-card').classList.add('active');
  }

  // Handle Report Type Selection Styling
  function selectTypeCard(radio) {
    document.querySelectorAll('.type-card').forEach(card => card.classList.remove('active'));
    radio.closest('.type-card').classList.add('active');
    handleReportTypeChange(radio);
  }

  // Auto-fill prompt chip
  function fillPrompt(text) {
    document.getElementById('userPrompt').value = text;
    showToast('AI prompt updated', 'info');
  }

  // Google Sheet Data Previewing
  function previewSheetData() {
    const url = document.getElementById('sheetUrl').value.trim();
    const name = document.getElementById('sheetName').value.trim();
    
    if (!url) {
      showToast('Please provide a Google Sheets URL first.', 'error');
      return;
    }
    
    showToast('Fetching sheet preview...', 'info');
    
    google.script.run
      .withSuccessHandler(function(data) {
        if (!data || data.length === 0) {
          showToast('No rows found in this sheet.', 'warning');
          return;
        }
        
        // Build preview modal or inline table
        let html = '<div class="table-responsive"><table style="font-size: 11px; width: 100%; border-collapse: collapse;">';
        const headers = Object.keys(data[0]);
        
        // Headers
        html += '<thead><tr>';
        headers.forEach(h => html += `<th style="padding: 6px; border-bottom: 1px solid #ddd;">${h}</th>`);
        html += '</tr></thead><tbody>';
        
        // First 5 rows
        const rowsToShow = data.slice(0, 5);
        rowsToShow.forEach(row => {
          html += '<tr>';
          headers.forEach(h => {
            let val = row[h] || '';
            if (val.length > 30) val = val.substring(0, 27) + '...';
            html += `<td style="padding: 6px; border-bottom: 1px solid #eee;">${val}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table></div>';
        
        document.getElementById('preview-modal-body').innerHTML = html;
        openModal('preview-modal');
        showToast('Successfully loaded data preview!', 'success');
      })
      .withFailureHandler(function(err) {
        showToast(err.message, 'error');
      })
      .getSheetData(url, name);
  }

  // Loading Steps Control
  function updateLoadingStep(stepIndex) {
    const steps = document.querySelectorAll('.step-item');
    steps.forEach((step, idx) => {
      step.classList.remove('active', 'complete', 'pending');
      if (idx < stepIndex) {
        step.classList.add('complete');
      } else if (idx === stepIndex) {
        step.classList.add('active');
      } else {
        step.classList.add('pending');
      }
    });
  }

  // Generate Report Main Action
  function startReportGeneration() {
    const sheetUrl = document.getElementById('sheetUrl').value.trim();
    const sheetName = document.getElementById('sheetName').value.trim();
    const csvData = document.getElementById('csvData').value.trim();
    const reportTitle = document.getElementById('reportTitle').value.trim();
    const companyName = document.getElementById('companyNameInput').value.trim();
    
    const reportTypeRadio = document.querySelector('input[name="reportType"]:checked');
    const reportType = reportTypeRadio ? reportTypeRadio.value : 'weekly';
    
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    
    const aiModelRadio = document.querySelector('input[name="aiModel"]:checked');
    const aiModel = aiModelRadio ? aiModelRadio.value : 'gemini';
    
    const userPrompt = document.getElementById('userPrompt').value.trim();
    
    if (!sheetUrl && !csvData) {
      showToast('Specify either a Google Sheet URL or paste raw CSV data.', 'error');
      return;
    }
    
    if (!userPrompt) {
      showToast('Tell the AI what to highlight or look for in your report prompt.', 'error');
      return;
    }
    
    // Show loading overlay
    document.getElementById('loading-overlay').style.display = 'flex';
    updateLoadingStep(0); // Fetching Data
    
    const config = {
      sheetUrl: sheetUrl,
      sheetName: sheetName,
      csvData: csvData,
      reportType: reportType,
      startDate: startDate,
      endDate: endDate,
      userPrompt: userPrompt,
      aiModel: aiModel,
      reportTitle: reportTitle || 'AI Business Report',
      companyName: companyName
    };
    
    // Step 2: Analysis (will trigger via timeout to simulate steps)
    setTimeout(() => updateLoadingStep(1), 1800);
    // Step 3: Construction
    setTimeout(() => updateLoadingStep(2), 4000);
    
    google.script.run
      .withSuccessHandler(function(result) {
        updateLoadingStep(3); // Saving to Drive
        setTimeout(() => {
          document.getElementById('loading-overlay').style.display = 'none';
          
          if (result.success) {
            showToast('Report generated successfully!', 'success');
            renderPreviewReport(result.reportHtml, result.driveUrl, result.title, result.reportId);
          } else {
            showToast(result.error || 'Unknown error generating report.', 'error');
          }
        }, 1200);
      })
      .withFailureHandler(function(err) {
        document.getElementById('loading-overlay').style.display = 'none';
        showToast(err.message || 'Server error occurred.', 'error');
      })
      .generateReport(config);
  }

  // Render report preview in an iframe using Blob object URLs
  let currentReportHtml = '';
  let currentDriveUrl = '';
  let currentReportTitle = '';
  let currentReportId = '';

  function renderPreviewReport(html, driveUrl, title, reportId) {
    currentReportHtml = html;
    currentDriveUrl = driveUrl;
    currentReportTitle = title;
    currentReportId = reportId;
    
    document.getElementById('preview-title').innerText = title;
    
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    document.getElementById('reportFrame').src = url;
    
    // Reveal section
    document.getElementById('report-output-section').style.display = 'block';
    // Scroll smoothly to output
    document.getElementById('report-output-section').scrollIntoView({behavior: 'smooth'});
  }

  // Download complete report HTML file
  function downloadReportHtml() {
    if (!currentReportHtml) return;
    const blob = new Blob([currentReportHtml], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentReportTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('Report HTML downloaded!', 'success');
  }

  // Trigger PDF Printing
  function printReportPdf() {
    const frame = document.getElementById('reportFrame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.focus();
      frame.contentWindow.print();
    }
  }

  // Copy shareable Drive Link to Clipboard
  function copyShareLink() {
    if (!currentDriveUrl) return;
    navigator.clipboard.writeText(currentDriveUrl)
      .then(() => showToast('Shareable Drive link copied to clipboard!', 'success'))
      .catch(() => showToast('Failed to copy link. Drive URL: ' + currentDriveUrl, 'info'));
  }

  // Open Email Modal
  function openEmailModal() {
    document.getElementById('email-recipients').value = '';
    openModal('email-modal');
  }

  // Send Email Action
  function sendEmailReport() {
    const recipients = document.getElementById('email-recipients').value.trim();
    if (!recipients) {
      showToast('Please enter at least one email address.', 'warning');
      return;
    }
    
    showToast('Sending report by email...', 'info');
    closeModal('email-modal');
    
    google.script.run
      .withSuccessHandler(function() {
        showToast('Email sent successfully!', 'success');
      })
      .withFailureHandler(function(err) {
        showToast('Failed to email report: ' + err.message, 'error');
      })
      .emailReport(currentReportHtml, recipients, currentReportTitle);
  }

  // Modal Control helpers
  function openModal(id) {
    document.getElementById(id).style.display = 'flex';
  }

  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  // History Tab: Load saved reports
  function loadReportHistory() {
    const container = document.getElementById('history-list-grid');
    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">⚡ Scanning Drive folder...</div>';
    
    google.script.run
      .withSuccessHandler(function(history) {
        if (!history || history.length === 0) {
          container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">📁 No saved reports found in Drive yet. Run a report to create one!</div>';
          return;
        }
        
        let html = '';
        history.forEach(item => {
          const dateStr = new Date(item.createdDate).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
          html += `
            <div class="history-card" id="hist-card-${item.id}">
              <div>
                <div class="history-meta">
                  <span>${dateStr}</span>
                  <span class="history-badge">HTML</span>
                </div>
                <h3 class="history-title">${item.name}</h3>
              </div>
              <div style="display: flex; gap: 8px; margin-top: 14px;">
                <a href="${item.driveUrl}" target="_blank" class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px; width: auto; flex: 1;">🌐 Open</a>
                <button onclick="deleteHistoryFile('${item.id}')" class="btn btn-secondary btn-icon" style="flex-shrink: 0; color: var(--danger);"><span style="font-size: 14px;">🗑️</span></button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        container.innerHTML = `<div style="grid-column: 1/-1; color: var(--danger); padding: 40px; text-align: center;">Error loading history: ${err.message}</div>`;
      })
      .getReportHistory();
  }

  function deleteHistoryFile(fileId) {
    if (!confirm('Are you sure you want to delete this report from your Google Drive?')) return;
    
    showToast('Deleting report...', 'info');
    google.script.run
      .withSuccessHandler(function() {
        const card = document.getElementById(`hist-card-${fileId}`);
        if (card) card.remove();
        showToast('Report deleted from Drive.', 'success');
      })
      .withFailureHandler(function(err) {
        showToast('Delete failed: ' + err.message, 'error');
      })
      .deleteHistoryFile(fileId); // Needs to be supported on Code.gs if deleting, else we just remove in UI
  }

  // Schedules Tab logic
  function openScheduleModal() {
    // Sync current generator field values to schedule config
    document.getElementById('sched-sheetUrl').value = document.getElementById('sheetUrl').value;
    document.getElementById('sched-sheetName').value = document.getElementById('sheetName').value;
    document.getElementById('sched-reportTitle').value = document.getElementById('reportTitle').value || 'Scheduled AI Report';
    document.getElementById('sched-userPrompt').value = document.getElementById('userPrompt').value;
    
    // Clear weekly/monthly custom selections
    document.querySelectorAll('.day-cb').forEach(cb => cb.checked = false);
    document.getElementById('sched-recipients').value = '';
    
    openModal('schedule-modal');
  }

  function handleScheduleFrequencyChange(select) {
    const weeklyGroup = document.getElementById('weekly-days-group');
    const monthlyGroup = document.getElementById('monthly-day-group');
    
    weeklyGroup.style.display = select.value === 'weekly' ? 'block' : 'none';
    monthlyGroup.style.display = select.value === 'monthly' ? 'block' : 'none';
  }

  function saveReportSchedule() {
    const sheetUrl = document.getElementById('sched-sheetUrl').value.trim();
    const sheetName = document.getElementById('sched-sheetName').value.trim();
    const reportTitle = document.getElementById('sched-reportTitle').value.trim();
    const userPrompt = document.getElementById('sched-userPrompt').value.trim();
    const recipients = document.getElementById('sched-recipients').value.trim();
    
    const frequency = document.getElementById('sched-frequency').value;
    const aiModel = document.getElementById('sched-aiModel').value;
    const reportType = document.getElementById('sched-reportType').value;
    
    if (!sheetUrl) {
      showToast('Schedules require a connected Google Sheet URL to pull live data.', 'warning');
      return;
    }
    
    if (!userPrompt) {
      showToast('An AI report prompt is required for scheduling.', 'warning');
      return;
    }
    
    if (!recipients) {
      showToast('Recipient emails are required to deliver scheduled reports.', 'warning');
      return;
    }
    
    const weeklyDays = {};
    if (frequency === 'weekly') {
      document.querySelectorAll('.day-cb').forEach(cb => {
        if (cb.checked) weeklyDays[cb.value] = true;
      });
    }
    
    const config = {
      sheetUrl,
      sheetName,
      reportTitle,
      userPrompt,
      recipients: recipients.split(',').map(e => e.trim()),
      frequency,
      aiModel,
      reportType,
      weeklyDays,
      monthlyDay: document.getElementById('sched-monthlyDay').value
    };
    
    showToast('Saving automation schedule...', 'info');
    closeModal('schedule-modal');
    
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          showToast('Schedule saved successfully!', 'success');
          loadSchedules();
        } else {
          showToast('Failed to save schedule: ' + res.error, 'error');
        }
      })
      .withFailureHandler(function(err) {
        showToast(err.message, 'error');
      })
      .scheduleReport(config);
  }

  function loadSchedules() {
    const tbody = document.getElementById('schedule-table-body');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 24px; color: var(--text-muted);">⚡ Fetching active schedules...</td></tr>';
    
    google.script.run
      .withSuccessHandler(function(schedules) {
        if (!schedules || schedules.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 24px; color: var(--text-muted);">⏰ No automated schedules found. Create one now to run reports automatically!</td></tr>';
          return;
        }
        
        let html = '';
        schedules.forEach(item => {
          html += `
            <tr id="sched-row-${item.id}">
              <td style="font-weight: 600;">${item.reportTitle || 'Untitled'}</td>
              <td style="font-size: 12px; color: var(--text-muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.sheetName || 'First Sheet'}</td>
              <td style="text-transform: capitalize; font-weight: 500;">${item.frequency}</td>
              <td style="font-size: 12px; color: var(--text-muted);">${item.recipients.join(', ')}</td>
              <td><span class="status-badge ${item.status}">${item.status}</span></td>
              <td>
                <div style="display: flex; gap: 6px;">
                  <button onclick="deleteSavedSchedule('${item.id}')" class="btn btn-secondary" style="padding: 4px 8px; font-size: 12px; width: auto; color: var(--danger);">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 24px; color: var(--danger);">Failed to load schedules: ${err.message}</td></tr>`;
      })
      .getSchedules();
  }

  function deleteSavedSchedule(id) {
    if (!confirm('Are you sure you want to remove this report automation schedule?')) return;
    
    showToast('Deleting schedule...', 'info');
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          const row = document.getElementById(`sched-row-${id}`);
          if (row) row.remove();
          showToast('Schedule removed.', 'success');
        } else {
          showToast('Failed to remove: ' + res.error, 'error');
        }
      })
      .withFailureHandler(function(err) {
        showToast('Server error: ' + err.message, 'error');
      })
      .deleteSchedule(id);
  }

  // Settings tab form saving
  function saveAppSettings() {
    const settings = {
      claudeKey: document.getElementById('settings-claudeKey').value,
      openaiKey: document.getElementById('settings-openaiKey').value,
      geminiKey: document.getElementById('settings-geminiKey').value,
      companyName: document.getElementById('settings-companyName').value.trim(),
      logoUrl: document.getElementById('settings-logoUrl').value.trim(),
      accentColor: document.getElementById('settings-accentColor').value,
      footerText: document.getElementById('settings-footerText').value.trim(),
      timezone: document.getElementById('settings-timezone').value,
      defaultAiModel: document.getElementById('settings-defaultAiModel').value,
      defaultReportType: document.getElementById('settings-defaultReportType').value,
      reportPassword: document.getElementById('settings-reportPassword').value.trim()
    };
    
    showToast('Saving settings securely...', 'info');
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          showToast('Settings saved successfully!', 'success');
          // Update branding in header
          if (settings.companyName) {
            document.getElementById('header-company').innerText = settings.companyName;
          }
        } else {
          showToast('Error saving: ' + res.error, 'error');
        }
      })
      .withFailureHandler(function(err) {
        showToast(err.message, 'error');
      })
      .saveSettings(settings);
  }

  function loadSettings() {
    google.script.run
      .withSuccessHandler(function(settings) {
        if (!settings) return;
        document.getElementById('settings-claudeKey').value = settings.claudeKey || '';
        document.getElementById('settings-openaiKey').value = settings.openaiKey || '';
        document.getElementById('settings-geminiKey').value = settings.geminiKey || '';
        document.getElementById('settings-companyName').value = settings.companyName || '';
        document.getElementById('settings-logoUrl').value = settings.logoUrl || '';
        document.getElementById('settings-accentColor').value = settings.accentColor || '#4F46E5';
        document.getElementById('settings-footerText').value = settings.footerText || '';
        document.getElementById('settings-timezone').value = settings.timezone || 'GMT';
        document.getElementById('settings-defaultAiModel').value = settings.defaultAiModel || 'gemini';
        document.getElementById('settings-defaultReportType').value = settings.defaultReportType || 'weekly';
        document.getElementById('settings-reportPassword').value = settings.reportPassword || '';
        
        // Sync header branding
        if (settings.companyName) {
          document.getElementById('header-company').innerText = settings.companyName;
        }
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load settings: ' + err.message, 'error');
      })
      .getSettings();
  }

  // Toggle API Key view mode
  function togglePasswordInput(btn, inputId) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerText = '🙈';
    } else {
      input.type = 'password';
      btn.innerText = '👁️';
    }
  }

  // Initial Bootup
  window.addEventListener('DOMContentLoaded', () => {
    switchTab('generate');
    loadSettings();
  });
</script>
